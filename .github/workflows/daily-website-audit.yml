name: Daily Website Audit & Improvement

on:
  schedule:
    # Runs every day at 9 AM EST (14:00 UTC)
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run even if already ran today'
        required: false
        default: 'false'
        type: string

concurrency:
  group: daily-audit
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run daily audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
        run: node scripts/daily-audit.js

      - name: Commit improvements and open PR
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DID_CHANGE=$(cat /tmp/audit-changed.txt 2>/dev/null || echo "false")

          if [ "$DID_CHANGE" = "true" ]; then
            TASK=$(cat /tmp/audit-task.txt 2>/dev/null || echo "daily improvement")
            BRANCH="claude/daily-audit-$(date +'%Y-%m-%d')"

            git config user.name "Arlo (DoryAngel Bot)"
            git config user.email "office@doryangel.com"
            git remote set-url origin https://dror75p-ops:${GH_TOKEN}@github.com/dror75p-ops/Doryangel-web-3-carousel-blog.git

            git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH"
            git add -A
            git commit -m "Auto-improve: $TASK" || echo "Nothing new to commit"
            git push --force origin "$BRANCH"

            PR_RESPONSE=$(curl -s -X POST \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/dror75p-ops/Doryangel-web-3-carousel-blog/pulls" \
              -d "{\"title\":\"Auto-improve: $TASK\",\"body\":\"Auto-implemented by Arlo, DoryAngel's daily audit agent. Review the diff and merge to apply. Generated on $(date +'%Y-%m-%d').\",\"head\":\"$BRANCH\",\"base\":\"main\"}")

            echo "$PR_RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print('PR opened:',d['html_url']) if 'html_url' in d else print('PR already exists' if any('already exists' in str(e) for e in d.get('errors',[])) else 'PR error:'+repr(d)[:200])"
          else
            echo "No code changes today — GitHub Issue was created instead."
          fi
