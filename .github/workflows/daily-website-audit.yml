name: Daily Website Audit & Improvement

on:
  schedule:
    # Runs every day at 9 AM EST (14:00 UTC)
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run even if already ran today'
        required: false
        default: 'false'
        type: string

concurrency:
  group: daily-audit
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run daily audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
        run: node scripts/daily-audit.js

      - name: Commit improvements and open PR
        env:
          # Use the workflow's built-in GITHUB_TOKEN (has contents+pull-requests write)
          # for both push and PR creation. The standalone GH_TOKEN secret was expired
          # (401 Bad credentials), which silently broke PR creation for weeks.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DID_CHANGE=$(cat /tmp/audit-changed.txt 2>/dev/null || echo "false")

          if [ "$DID_CHANGE" = "true" ]; then
            TASK=$(cat /tmp/audit-task.txt 2>/dev/null || echo "daily improvement")
            BRANCH="claude/daily-audit-$(date +'%Y-%m-%d')"

            git config user.name "Arlo (DoryAngel Bot)"
            git config user.email "office@doryangel.com"

            git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH"
            git add -A
            git commit -m "Auto-improve: $TASK" || echo "Nothing new to commit"
            git push --force origin "$BRANCH"

            # Create the PR with the gh CLI (authenticates via GH_TOKEN = GITHUB_TOKEN).
            # If a PR already exists for this branch, gh exits non-zero — treat as success.
            PR_URL=$(gh pr create \
              --title "Auto-improve: $TASK" \
              --body "Auto-implemented by Arlo, DoryAngel's daily audit agent. Review the diff and merge to apply. Generated on $(date +'%Y-%m-%d')." \
              --head "$BRANCH" \
              --base main 2>&1) && echo "PR opened: $PR_URL" || echo "PR not created (may already exist): $PR_URL"
          else
            echo "No code changes today — GitHub Issue was created instead."
          fi
