<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | DoryAngel Property Management NYC</title>
<meta name="description" content="Thanks for reaching out. A DoryAngel team member will be in touch shortly.">
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="https://dror75p-ops.github.io/Doryangel-web-3-carousel-blog/thank-you.html">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0F2847;
    --blue: #1E5AA8;
    --blue-light: #5B9FEA;
    --blue-dim: #EBF3FD;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #F4F7FA;
    color: var(--navy);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 56px 48px;
    max-width: 520px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 32px rgba(15,40,71,0.10);
  }
  .icon-wrap {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--blue-dim);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
  }
  .icon-wrap svg { color: var(--blue); }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    font-weight: 400;
    margin-bottom: 14px;
    color: var(--navy);
  }
  p {
    font-size: 16px;
    color: #4A5568;
    line-height: 1.65;
    margin-bottom: 32px;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--blue);
    color: #fff;
    padding: 14px 28px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    transition: background 0.2s;
  }
  .btn:hover { background: var(--navy); }
  .footer-note {
    margin-top: 28px;
    font-size: 13px;
    color: #8B9BAE;
  }
  .footer-note a { color: var(--blue); text-decoration: none; }
  @media (max-width: 540px) {
    .card { padding: 40px 24px; }
    h1 { font-size: 26px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="icon-wrap">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
      <polyline points="22 4 12 14.01 9 11.01"/>
    </svg>
  </div>
  <h1>Message received!</h1>
  <p>Thanks for reaching out to DoryAngel. A member of our team will get back to you within one business day. We look forward to helping with your property.</p>
  <a href="./" class="btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Back to DoryAngel
  </a>
  <div class="footer-note">
    Questions? Call us at <a href="tel:+15168474999">(516) 847-4999</a> or email <a href="mailto:office@doryangel.com">office@doryangel.com</a>
  </div>
</div>

</body>
</html>
