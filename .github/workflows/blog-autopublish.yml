name: Auto-publish blog post

on:
  schedule:
    # Runs every 3 days at 9:00 AM EST (14:00 UTC) — explicit dates avoid month-boundary gaps
    - cron: '0 14 1,4,7,10,13,16,19,22,25,28 * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force publish even if a post was already published today'
        required: false
        default: 'false'
        type: string

concurrency:
  group: blog-publish
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate blog post and send approval email
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FORCE_PUBLISH: ${{ github.event.inputs.force || 'false' }}
        run: node scripts/generate-post.js

      - name: Build per-post HTML pages + sitemap
        run: node scripts/build-blog.js

      - name: Commit and push new post
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name "DoryAngel Bot"
          git config user.email "office@doryangel.com"
          git remote set-url origin https://dror75p-ops:${GH_TOKEN}@github.com/dror75p-ops/Doryangel-web-3-carousel-blog.git
          git add content/blog/posts-index.json blog/ sitemap.xml
          git diff --staged --quiet && echo "Nothing to commit — post was skipped" && exit 0
          git commit -m "Auto-publish: new blog post $(date +'%Y-%m-%d')"
          git push origin main
