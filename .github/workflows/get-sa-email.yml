name: Get SA Email (temp)

on:
  workflow_dispatch:

jobs:
  print-sa-email:
    runs-on: ubuntu-latest
    steps:
      - name: Print service account email
        env:
          GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
        run: |
          node -e "const k = JSON.parse(process.env.GOOGLE_SA_KEY); console.log('SA_EMAIL:', k.client_email);"
