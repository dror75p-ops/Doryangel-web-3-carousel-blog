name: Traffic Compare (Tally)

# Agent "Tally" — compares beta.doryangel.com (GA4) vs old doryangel.com (Wix)
# and emails a learn-and-improve digest. Read-only: no commits, PRs, or issues.
# Run it on demand from the Actions tab ("Run workflow").

on:
  workflow_dispatch: {}
  # Uncomment to also run on a schedule once the comparison is trusted:
  # schedule:
  #   - cron: '0 13 * * 1'   # Mondays 9 AM EST

concurrency:
  group: traffic-compare
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Tally traffic comparison
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          WIX_API_KEY: ${{ secrets.WIX_API_KEY }}
          WIX_SITE_ID: ${{ secrets.WIX_SITE_ID }}
          WIX_ACCOUNT_ID: ${{ secrets.WIX_ACCOUNT_ID }}
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
        run: node scripts/traffic-compare.js
