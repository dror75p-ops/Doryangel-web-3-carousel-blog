name: Refresh all post images (one-shot)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Refresh all images
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: node scripts/refresh-images.js

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name "DoryAngel Bot"
          git config user.email "office@doryangel.com"
          git remote set-url origin https://dror75p-ops:${GH_TOKEN}@github.com/dror75p-ops/Doryangel-web-3-carousel-blog.git
          git add content/blog/posts-index.json
          git commit -m "Refresh all post images with new aligned queries" || echo "No changes"
          git push origin main
